apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-nestjs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"  # Label ini dibaca oleh Grafana sidecar secara otomatis
data:
  nestjs-dashboard.json: |-
    {
      "title": "NestJS Backend - LogiLearn",
      "uid": "nestjs-logilearn",
      "tags": ["nestjs", "backend", "logilearn"],
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "HTTP Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(http_requests_total{namespace=\"myapp\", app=\"backend\"}[1m])",
              "legendFormat": "{{method}} {{route}} {{status}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "HTTP Request Duration (p99)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{namespace=\"myapp\", app=\"backend\"}[5m]))",
              "legendFormat": "p99 latency",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "HTTP Error Rate (4xx/5xx)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(http_requests_total{namespace=\"myapp\", app=\"backend\", status=~\"4..|5..\"}[1m])",
              "legendFormat": "Error {{status}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Node.js Heap Memory Used",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "nodejs_heap_size_used_bytes{namespace=\"myapp\", app=\"backend\"}",
              "legendFormat": "Heap Used",
              "refId": "A"
            }
          ]
        }
      ]
    }
