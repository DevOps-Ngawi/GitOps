apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-postgresql
  namespace: monitoring
  labels:
    grafana_dashboard: "1"  # Label ini dibaca oleh Grafana sidecar secara otomatis
data:
  postgresql-dashboard.json: |-
    {
      "title": "PostgreSQL - LogiLearn Database",
      "uid": "postgresql-logilearn",
      "tags": ["postgresql", "database", "logilearn"],
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Active Connections",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "pg_stat_activity_count{namespace=\"myapp\", datname=\"logilearn\"}",
              "legendFormat": "Active connections",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Database Size",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "pg_database_size_bytes{datname=\"logilearn\"}",
              "legendFormat": "DB Size",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Transactions per Second",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(pg_stat_database_xact_commit_total{datname=\"logilearn\"}[1m]) + rate(pg_stat_database_xact_rollback_total{datname=\"logilearn\"}[1m])",
              "legendFormat": "TPS",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Cache Hit Ratio",
          "type": "gauge",
          "gridPos": { "x": 12, "y": 8, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "pg_stat_database_blks_hit{datname=\"logilearn\"} / (pg_stat_database_blks_hit{datname=\"logilearn\"} + pg_stat_database_blks_read{datname=\"logilearn\"}) * 100",
              "legendFormat": "Cache Hit %",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "minVizValue": 0,
            "maxVizValue": 100
          }
        },
        {
          "id": 5,
          "title": "PVC Disk Usage (postgres-pvc)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "kubelet_volume_stats_used_bytes{namespace=\"myapp\", persistentvolumeclaim=\"postgres-pvc\"}",
              "legendFormat": "Used bytes",
              "refId": "A"
            }
          ]
        }
      ]
    }
